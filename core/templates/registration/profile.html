{% extends 'core/base.html' %}

{% block pagetitle %} Мой профиль {% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="card">
        <div class="card-header bg-info text-white">
            <h3>Привет, {{ user.username }} 🫰</h3>
        </div>
        <div class="card-body">
            <p>Это твой личный кабинет.</p>
            <p>Здесь будет статистика твоих успехов 📊 (в следующих версиях).</p>
            <hr>
            <form action="{% url 'logout' %}" method="post">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger">Выйти из аккаунта</button>
            </form>
        </div>
    </div>
</div>    
{% endblock %}
