{% extends 'core/base.html' %}

{% block pagetitle %} Регистрация {% endblock %}

{% block content %}
    <div class="container mt-5" style="max-width: 500px;">
        <h2 class="mb-4">Регистрация</h2>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="button btn-success w-100 mt-3">Создать аккаунт</button>
        </form>
        <p class="mt-3">У вас уже есть аккаунт? <a href="{% url 'login' %}">Войти</a></p>
    </div>
{% endblock %}
